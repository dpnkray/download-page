<!DOCTYPE html>
<html>
<head>
  <title>Buy & Download Course</title>
</head>
<body style="text-align:center; margin-top:50px; font-family:sans-serif;">

  <h2>Algorithmic Trading Course</h2>

  <button id="download-btn_0">Download Free Preview Course Module</button>

  <br><br>

  <button id="pay-btn">Pay 1</button>

  <br><br>

  <button id="download-btn" disabled>Download Course</button>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  
  <script>
    var options = {
        "key": "rzp_live_SUVyfrzGVUA4HD",  // from Razorpay
        "amount": 100,
        "currency": "INR",
        "name": "Algorithmic Trading Course",
        "description": "Course Payment",
        "method": {
        "upi": true
        },
        "handler": function (response){
            alert("Payment Successful!");
            
            // Enable download button
            document.getElementById("download-btn").disabled = false;
        }
    };

    var rzp = new Razorpay(options);

    document.getElementById('pay-btn').onclick = function(e){
        rzp.open();
        e.preventDefault();
    }

    document.getElementById('download-btn_0').onclick = function(){
        window.location.href = "https://drive.google.com/uc?export=download&id=1lL0vnmCUjdTLs64WaK9kn1Rk0GI_ddHn";
    }

    document.getElementById('download-btn').onclick = function(){
        window.location.href = "https://drive.google.com/uc?export=download&id=1lL0vnmCUjdTLs64WaK9kn1Rk0GI_ddHn";
    }
  </script>

</body>
</html>
